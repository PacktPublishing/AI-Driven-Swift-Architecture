# SonarQube Configuration for SwiftVulnDemo
# ⚠️ AI-Generated project — intended for security scanning demo

sonar.projectKey=sassiwalid_SwiftVulnDemo
sonar.projectName=SwiftVulnDemo - AI Generated Vulnerable iOS App
sonar.organization=sassiwalid
sonar.projectVersion=1.0.0

# Source
sonar.sources=SwiftVulnDemo
sonar.sourceEncoding=UTF-8
sonar.swift.file.suffixes=.swift

# Exclusions
sonar.exclusions=**/*.generated.swift,**/*Tests*/**,**/Preview\ Content/**

# Coverage
# No test suite exists for this demo project. Disable the coverage report path
# so the scanner does not attempt to parse a non-existent file, which would
# cause an IllegalStateException and zero-coverage readings on all new code.
# Remove this comment and set the path once a test target is configured:
#   sonar.swift.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/*.swift
